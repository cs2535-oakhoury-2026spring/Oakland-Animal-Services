<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="screen-orientation" content="portrait" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Oakland Animal Services Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #f2f2f2; }

    /* Focus-visible outlines for accessibility (WCAG 2.1 AA) */
    *:focus-visible {
      outline: 2px solid #2d5a27 !important;
      outline-offset: 2px;
    }
    button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
      outline: 2px solid #2d5a27 !important;
      outline-offset: 2px;
    }

    /* Skip to main content link */
    .skip-link {
      position: absolute;
      top: -100px;
      left: 16px;
      background: #2d5a27;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      z-index: 100000;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      text-decoration: none;
      transition: top 0.2s ease;
    }
    .skip-link:focus {
      top: 16px;
    }

    /* Input focus glow */
    input:focus, textarea:focus, select:focus {
      border-color: #2d5a27 !important;
      box-shadow: 0 0 0 3px rgba(45, 90, 39, 0.15) !important;
    }
    
    /* Force portrait orientation message */
    #landscape-blocker {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #1a1a1a;
      color: #fff;
      z-index: 99999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      padding: 24px;
    }
    #landscape-blocker svg {
      margin-bottom: 16px;
      animation: rotate-phone 2s ease-in-out infinite;
    }
    @keyframes rotate-phone {
      0%, 100% { transform: rotate(90deg); }
      50% { transform: rotate(0deg); }
    }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      #landscape-blocker { display: flex !important; }
      #root { display: none !important; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="landscape-blocker">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="1" width="12" height="22" rx="2" />
      <line x1="12" y1="18" x2="12" y2="18.01" />
    </svg>
    <div style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">Please rotate your device</div>
    <div style="font-size: 14px; opacity: 0.7;">This app works best in portrait mode</div>
  </div>
  <div id="root"></div>
</body>
</html>
