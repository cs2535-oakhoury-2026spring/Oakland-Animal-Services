<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Observer Note Search</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      border: 1px solid black;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    .input-container {
      display: flex;
      gap: 20px;
    }

    #noteInput, #summaryOutput {
      width: 50%;
      height: 150px;
    }

    #summaryOutput {
      background-color: #f5f5f5;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      margin-right: 10px;
      background-color: white;
      border: 1px solid black;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #f0f0f0;
    }

    button.recording {
      background-color: #ffcccc;
      border-color: #ff0000;
    }

    #results {
      margin-top: 30px;
      border-top: 1px solid black;
      padding-top: 20px;
    }

    .entry {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #ccc;
    }

    .entry-header {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .entry-meta {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }

    .entry-content {
      line-height: 1.5;
    }

    b {
      background-color: yellow;
    }
  </style>
</head>
<body>
  <h1>Observer Notes for animals</h1>

  <div class="input-container">
    <textarea id="noteInput" placeholder="Enter observer note..."></textarea>
    <textarea id="summaryOutput" placeholder="AI summary will appear here..." onload="summarizeNotes()" readonly></textarea>
</div>

  <div>
    <button onclick="upload()">Upload</button>
    <button onclick="clearEntry()">Clear</button>
    <button id="voiceBtn" onclick="toggleVoiceRecording()">Record Voice</button>
  </div>


  <div id="results"></div>

  <script>
    let allNotes = [];
    const noteInput = document.getElementById('noteInput');
    const summaryOutput = document.getElementById('summaryOutput');

    let debounceTimer;
    let currentRequestId = 0;

    window.addEventListener('DOMContentLoaded', () => {
      loadAllNotes();
    });

    async function loadAllNotes() {
      try {
        const response = await fetch('/api/observer-notes');
        const data = await response.json();
        if (data.success) {
          allNotes = data.observerNotes;
          displayAllNotes(allNotes);
        }
      } catch (error) {
        console.warn('Error loading notes:', error);
      }
    }

    function displayAllNotes(notes) {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';

      const sortedNotes = [...notes].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      sortedNotes.forEach((note) => {
        const timestamp = new Date(note.timestamp).toLocaleString();
        const entryDiv = document.createElement('div');
        entryDiv.className = 'entry';
        entryDiv.innerHTML = `
          <div class="entry-header">${note.author}</div>
          <div class="entry-meta">${timestamp}</div>
          <div class="entry-content">${note.content}</div>
        `;
        resultsDiv.appendChild(entryDiv);
      });
    }

    document.getElementById('noteInput').addEventListener('input', () => {
      performSearch();
      
      if (debounceTimer) {
        clearTimeout(debounceTimer);
      }

      if (note.length < 30) {
        summaryOutput.value = '';
        return;
      }

      debounceTimer = setTimeout(() => {
        summarizeNote(note);
      }, 500);
    });

    async function performSearch() {
      const note = document.getElementById('noteInput').value.trim();
      
      if (!note) {
        displayAllNotes(allNotes);
        return;
      }


      try {
        // Add a debounce in the furture.
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            observerNote: note,
            maxResults: 10, // Implement a page system or scroll system in the future.
          }),
        });

        const data = await response.json();
        
        if (data.success && data.results.length > 0) {
          displayResults(data.results);
        } else {
          displayAllNotes(allNotes);
        }
      } catch (error) {
        console.warn('Search error:', error);
      }
    }

    function displayResults(results) {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';

      results.forEach((result) => {
        const timestamp = new Date(result.note.timestamp).toLocaleString();
        const entryDiv = document.createElement('div');
        entryDiv.className = 'entry';
        entryDiv.innerHTML = `
          <div class="entry-header">${result.note.author}</div>
          <div class="entry-meta">${timestamp}</div>
          <div class="entry-content">${result.highlightedContent}</div>
        `;
        resultsDiv.appendChild(entryDiv);
      });
    }

    async function upload() {
        // Create a post later to upload the note
        try {
          const content = document.getElementById('noteInput').value.trim();
          const author = "Dr. Someone Else";

          if (!content) {
            alert("Cannot upload an empty note");
            return;
          }

          const response = await fetch('/api/upload', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ content, author }),
          });

          const data = await response.json();

          if (data.success) {
            alert("Observer note uploaded successfully");
            document.getElementById('noteInput').value = '';
            loadAllNotes();
          } else {
            alert("Failed to upload observer note");
          }
        } catch (error) {
          console.warn('Upload error:', error);
        }

    }

    function clearEntry() {
      document.getElementById('noteInput').value = '';
      summaryOutput.value = '';
      displayAllNotes(allNotes);
    }

    let recognition = null;
    let isRecording = false;


    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onresult = (event) => {
        let interimTranscript = '';
        let finalTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalTranscript += transcript + ' ';
          } else {
            interimTranscript += transcript;
          }
        }

        if (finalTranscript) {
          const textarea = document.getElementById('noteInput');
          const currentValue = textarea.value;
          textarea.value = currentValue + (currentValue ? ' ' : '') + finalTranscript;
          performSearch();
        }
      };

      recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        if (event.error === 'no-speech') {
          console.log('No speech detected');
        }
        stopRecording();
      };

      recognition.onend = () => {
        if (isRecording) {
          recognition.start();
        }
      };
    }

    function toggleVoiceRecording() {
      if (!recognition) {
        alert('Speech recognition is not supported in your browser.');
        return;
      }

      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    function startRecording() {
      try {
        recognition.start();
        isRecording = true;
        const btn = document.getElementById('voiceBtn');
        btn.classList.add('recording');
        btn.textContent = 'Stop Recording';
      } catch (error) {
        console.error('Error starting recognition:', error);
      }
    }

    function stopRecording() {
      if (recognition && isRecording) {
        recognition.stop();
        isRecording = false;
        const btn = document.getElementById('voiceBtn');
        btn.classList.remove('recording');
        btn.textContent = 'Record Voice';
      }
    }

  async function summarizeNotes(note) {
    const requestId = ++currentRequestId;

    summaryOutput.value = 'Summarizing...';

    try {
      const response = await fetch('/api/summarize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: note }),
      });

      const data = await response.json();

    // prevent old responses overwriting new ones
      if (requestId !== currentRequestId) return;

      if (data.success) {
        summaryOutput.value = data.summary;
      } else {
        summaryOutput.value = 'Failed to summarize.';
      }
    } catch (error) {
      console.warn('Summarization error:', error);
      summaryOutput.value = 'Error generating summary.';
    }
  }
  </script>
</body>
</html>
